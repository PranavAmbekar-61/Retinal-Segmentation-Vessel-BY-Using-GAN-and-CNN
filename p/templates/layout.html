{% extends "base.html" %}
{% block body %}
<div class="app-shell">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="brand"><div class="brand-dot"></div>RetinaSeg</div>
    </div>
    <nav class="sidebar-nav">
      <a href="{{ url_for('dashboard') }}" class="nav-item {% if active=='dashboard' %}active{% endif %}">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="10" y="2" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="2" y="10" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="10" y="10" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="{{ url_for('upload_page') }}" class="nav-item {% if active=='upload' %}active{% endif %}">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 3v9M5 7l4-4 4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 13v1.5A1.5 1.5 0 003.5 16h11A1.5 1.5 0 0016 14.5V13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <span>Upload</span>
      </a>
      <a href="{{ url_for('history_page') }}" class="nav-item {% if active=='history' %}active{% endif %}">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="6.5" stroke="currentColor" stroke-width="1.4"/><path d="M9 5.5V9l2.5 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>History</span>
      </a>
      <a href="{{ url_for('patients_page') }}" class="nav-item {% if active=='patients' %}active{% endif %}">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        <span>Patients</span>
      </a>
      <a href="{{ url_for('profile_page') }}" class="nav-item {% if active=='profile' %}active{% endif %}">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="6" r="3" stroke="currentColor" stroke-width="1.4"/><path d="M2 16c0-3.3 3.1-6 7-6s7 2.7 7 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <span>Profile</span>
      </a>
      {% if user.role == 'admin' %}
      <a href="{{ url_for('admin_dashboard') }}" class="nav-item {% if active=='admin' %}active{% endif %}">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        <span>Admin Panel</span>
      </a>
      {% endif %}
    </nav>
    <div class="sidebar-bottom">
      <div class="user-chip">
        <div class="user-avatar">{{ user.name[0].upper() }}</div>
        <div class="user-meta">
          <div class="user-name">{{ user.name }}</div>
          <div class="user-role">{{ user.role | capitalize }}</div>
        </div>
      </div>
      <a href="{{ url_for('logout') }}" class="nav-item logout-item">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M7 16H3.5A1.5 1.5 0 012 14.5v-11A1.5 1.5 0 013.5 2H7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M12 13l4-4-4-4M16 9H7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Sign out</span>
      </a>
    </div>
  </aside>

  <div class="app-main">
    <header class="app-header">
      <button class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 4h14M2 9h14M2 14h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <div class="header-right">
        <button class="theme-btn" onclick="toggleTheme()">
          <svg class="icon-sun" width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.4 3.4l1.1 1.1M11.5 11.5l1.1 1.1M3.4 12.6l1.1-1.1M11.5 4.5l1.1-1.1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13.5 10.5A6 6 0 016 2.5a6 6 0 100 11 6 6 0 007.5-3z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <div class="header-user">{{ user.name }}</div>
      </div>
    </header>
    <main class="app-content">
      {% block content %}{% endblock %}
    </main>
  </div>
</div>
{% endblock %}
